<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#4a2c0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="암석탐구"/>
<title>🪨 산행 암석 탐구</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(135deg,#f5f0e8,#e8d5b0);min-height:100vh;font-family:'Segoe UI',sans-serif;padding:16px;}
.wrap{max-width:520px;margin:0 auto;}
.hdr{text-align:center;margin-bottom:20px;}
.hdr h1{font-size:22px;font-weight:800;color:#4a2c0a;margin:6px 0 2px;}
.hdr p{font-size:13px;color:#8a6a3a;}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.card-title{font-weight:700;font-size:14px;color:#5a3e1b;margin-bottom:12px;border-bottom:2px solid #e8d5b0;padding-bottom:6px;}
input[type=text]{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #d4b896;font-size:14px;outline:none;background:#fdfaf5;}
.upload-box{border:2px dashed #c4a06a;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fdfaf5;}
.btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:700;cursor:pointer;display:block;}
.btn-green{background:linear-gradient(135deg,#6b8f4a,#4a7c2f);color:#fff;}
.btn-gold{padding:14px;border-radius:10px;font-size:16px;background:linear-gradient(135deg,#8B6914,#c4a035);color:#fff;box-shadow:0 4px 12px rgba(139,105,20,.3);margin-top:4px;}
.btn-reset{background:linear-gradient(135deg,#4a7c2f,#6b8f4a);color:#fff;padding:13px;border-radius:10px;font-size:15px;margin-top:4px;}
.err{color:#c0392b;background:#fdecea;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;}
.result-hdr{background:linear-gradient(135deg,#4a2c0a,#8B6914);border-radius:14px;padding:18px;margin-bottom:14px;color:#fff;text-align:center;}
.rname{font-size:26px;font-weight:800;}
.ename{font-size:15px;opacity:.85;margin-top:2px;}
.thumb{width:90px;height:90px;object-fit:cover;border-radius:10px;margin-top:10px;border:3px solid rgba(255,255,255,.4);}
table{width:100%;border-collapse:collapse;font-size:13px;}
td{padding:6px 10px;border-bottom:1px solid #ede0c8;}
.td-k{font-weight:600;color:#6b4c1e;width:38%;}
tr:nth-child(even){background:#fdf8f0;}
.chem-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.chem-item{border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between;border:1px solid #ede0c8;}
.chem-item:nth-child(odd){background:#fdf8f0;}
.chem-item:nth-child(even){background:#f5ead6;}
.chem-k{font-weight:700;font-size:12px;color:#6b4c1e;}
.chem-v{font-size:13px;color:#333;font-weight:600;}
.dist-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.dist-tag{background:#f0e6cc;color:#6b4c1e;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
video{width:100%;border-radius:8px;background:#000;display:block;}
.cam-btns{display:flex;gap:8px;margin-top:8px;}
.cam-btns button{flex:1;padding:10px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:14px;}
.hidden{display:none;}
canvas{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div style="font-size:40px">🪨</div>
    <h1>산행 암석 탐구</h1>
    <p>이름 입력 · 이미지 업로드 · 카메라 촬영</p>
  </div>

  <!-- 입력 화면 -->
  <div id="inputView">
    <div class="card" id="apiCard">
      <div class="card-title">🔑 Gemini API 키</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="password" id="apiKeyInput" placeholder="AIzaSy..." style="flex:1;padding:10px 12px;border-radius:8px;border:1.5px solid #d4b896;font-size:13px;outline:none;background:#fdfaf5;"/>
        <button onclick="saveKey()" style="padding:10px 14px;border-radius:8px;border:none;background:#8B6914;color:#fff;font-weight:700;cursor:pointer;white-space:nowrap;font-size:13px;">저장</button>
      </div>
      <div id="keyStatus" style="font-size:11px;color:#8a6a3a;margin-top:6px"></div>
      <div style="font-size:11px;color:#aaa;margin-top:4px">
        <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#8B6914">aistudio.google.com</a>에서 발급 · 이 기기에만 저장됩니다
      </div>
    </div>

    <div class="card">
      <div class="card-title">① 암석 이름 입력</div>
      <input type="text" id="rockInput" placeholder="예: 화강암, granite, 현무암..."/>
    </div>

    <div class="card">
      <div class="card-title">② 이미지 업로드</div>
      <div class="upload-box" id="uploadBox">
        <div id="uploadPlaceholder">
          <div style="font-size:32px">📁</div>
          <div style="font-size:13px;color:#8a6a3a;margin-top:6px">클릭하여 이미지 선택<br/><small style="font-size:11px;color:#b8946a">JPG, PNG, WEBP 지원</small></div>
        </div>
        <img id="uploadPreview" class="hidden" style="max-width:100%;max-height:180px;border-radius:8px;"/>
      </div>
      <input type="file" id="fileInput" accept="image/*" class="hidden"/>
    </div>

    <div class="card">
      <div class="card-title">③ 카메라 촬영</div>
      <div id="camOff">
        <button class="btn btn-green" onclick="startCam()">📷 카메라 열기</button>
      </div>
      <div id="camOn" class="hidden">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="cam-btns">
          <button style="background:#4a7c2f;color:#fff;" onclick="capture()">📸 촬영</button>
          <button style="background:#999;color:#fff;" onclick="stopCam()">✕ 취소</button>
        </div>
      </div>
    </div>

    <div id="errBox" class="err hidden"></div>
    <button class="btn btn-gold" id="analyzeBtn" onclick="analyze()">🔍 암석 분석하기</button>
  </div>

  <!-- 결과 화면 -->
  <div id="resultView" class="hidden"></div>
</div>

<script>
let imgB64 = null, stream = null;

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if(!k.startsWith('AIzaSy')) { document.getElementById('keyStatus').textContent='⚠️ AIzaSy 로 시작하는 Gemini 키를 입력해 주세요.'; return; }
  localStorage.setItem('rock_api_key', k);
  document.getElementById('keyStatus').textContent='✅ 저장되었습니다.';
  document.getElementById('apiKeyInput').value='••••••••••••••••••••';
}

// 저장된 키 복원
window.addEventListener('DOMContentLoaded', () => {
  const k = localStorage.getItem('rock_api_key');
  if(k) {
    document.getElementById('apiKeyInput').value='••••••••••••••••••••';
    document.getElementById('keyStatus').textContent='✅ 저장된 키가 있습니다.';
  }
});

// 파일 업로드
document.getElementById('uploadBox').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    document.getElementById('uploadPlaceholder').classList.add('hidden');
    const img = document.getElementById('uploadPreview');
    img.src = ev.target.result; img.classList.remove('hidden');
  };
  r.readAsDataURL(f);
};

// 엔터키
document.getElementById('rockInput').addEventListener('keydown', e => { if(e.key==='Enter') analyze(); });

// 카메라
async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    document.getElementById('camOff').classList.add('hidden');
    document.getElementById('camOn').classList.remove('hidden');
    document.getElementById('video').srcObject = stream;
  } catch(e) { showErr('카메라 접근 권한이 필요합니다.'); }
}
function stopCam() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  document.getElementById('camOff').classList.remove('hidden');
  document.getElementById('camOn').classList.add('hidden');
}
function capture() {
  const v=document.getElementById('video'), c=document.getElementById('canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  const d=c.toDataURL('image/jpeg',.85);
  imgB64=d.split(',')[1];
  document.getElementById('uploadPlaceholder').classList.add('hidden');
  const img=document.getElementById('uploadPreview');
  img.src=d; img.classList.remove('hidden');
  stopCam();
}

function showErr(msg) {
  const b=document.getElementById('errBox');
  b.textContent=msg; b.classList.remove('hidden');
}
function hideErr() { document.getElementById('errBox').classList.add('hidden'); }

// 분석
async function analyze() {
  const name = document.getElementById('rockInput').value.trim();
  if(!name && !imgB64) { showErr('암석 이름을 입력하거나 이미지를 제공해 주세요.'); return; }
  hideErr();
  const btn = document.getElementById('analyzeBtn');
  btn.textContent='🔍 분석 중...'; btn.disabled=true;

  const prompt = `${name?`암석 이름: ${name}`:'첨부된 이미지의 암석을 식별해 주세요.'}

다음 정보를 JSON으로만 응답하세요 (마크다운 없이):
{"name_ko":"한글이름","name_en":"English name","minerals":[{"name":"장석","percent":40},{"name":"석영","percent":30},{"name":"흑운모","percent":15},{"name":"휘석","percent":5},{"name":"감람석","percent":3}],"chemistry":[{"component":"SiO₂","percent":"72%"},{"component":"Al₂O₃","percent":"14%"},{"component":"K₂O","percent":"5%"},{"component":"Na₂O","percent":"4%"},{"component":"CaO","percent":"2%"},{"component":"Fe₂O₃","percent":"2%"}],"characteristics":{"color":"색상","hardness":"경도(모스)","texture":"조직","luster":"광택","origin":"생성환경"},"classification":{"rock_type":"화성암/퇴적암/변성암","sub_type":"세부분류","use":"용도별 분류"},"distribution":["분포지1","분포지2","분포지3"],"description":"설명 2-3문장"}`;

  const contents = [{
    parts: [{ text: prompt }]
  }];

  if(imgB64) {
    contents[0].parts.push({
      inline_data: {
        mime_type: "image/jpeg",
        data: imgB64
      }
    });
  }

  try {
    const apiKey = localStorage.getItem('rock_api_key');
    if(!apiKey) { showErr('API 키를 먼저 입력하고 저장해 주세요.'); btn.textContent='🔍 암석 분석하기'; btn.disabled=false; return; }

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents })
    });

    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const txt=data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const d=JSON.parse(txt.replace(/```json|```/g,'').trim());
    showResult(d);
  } catch(e) { showErr('분석 오류: '+e.message); }
  btn.textContent='🔍 암석 분석하기'; btn.disabled=false;
}

// SVG 파이차트 (외부 라이브러리 없이)
function svgPie(minerals) {
  const W=300,H=220,cx=110,cy=110,R=85;
  const COLORS=["#8B6914","#A0A0A0","#2D2D2D","#5C3A1E","#4A7C59","#C4A35A","#7B68EE"];
  const total=minerals.reduce((s,m)=>s+m.percent,0);
  let angle=-Math.PI/2, paths='', labels='', legend='';
  minerals.forEach((m,i)=>{
    const ratio=m.percent/total, sweep=ratio*2*Math.PI;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(angle+sweep), y2=cy+R*Math.sin(angle+sweep);
    const large=sweep>Math.PI?1:0;
    const mx=cx+(R+28)*Math.cos(angle+sweep/2), my=cy+(R+28)*Math.sin(angle+sweep/2);
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${COLORS[i%COLORS.length]}" opacity="0.88"/>`;
    labels+=`<text x="${mx}" y="${my}" text-anchor="${mx>cx?'start':'end'}" dominant-baseline="central" font-size="9.5" fill="#4a2c0a" font-weight="600">${m.name} ${m.percent}%</text>`;
    legend+=`<rect x="${W-110}" y="${12+i*22}" width="13" height="13" rx="3" fill="${COLORS[i%COLORS.length]}"/>
    <text x="${W-93}" y="${22+i*22}" font-size="11" fill="#333">${m.name}: ${m.percent}%</text>`;
    angle+=sweep;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${paths}${labels}${legend}</svg>`;
}

// SVG 막대그래프
function svgBar(minerals) {
  const COLORS=["#8B6914","#A0A0A0","#2D2D2D","#5C3A1E","#4A7C59","#C4A35A","#7B68EE"];
  const W=300,H=150,pad=30,bw=32,gap=8;
  const max=Math.max(...minerals.map(m=>m.percent));
  let bars='',texts='';
  minerals.forEach((m,i)=>{
    const bh=(m.percent/max)*(H-50);
    const x=pad+i*(bw+gap);
    const y=H-25-bh;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${COLORS[i%COLORS.length]}" opacity="0.88"/>`;
    texts+=`<text x="${x+bw/2}" y="${H-12}" text-anchor="middle" font-size="9" fill="#4a2c0a">${m.name}</text>`;
    texts+=`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="9" fill="#555">${m.percent}%</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${bars}${texts}</svg>`;
}

// SVG 결합구조도
function svgBond(rockType, minerals) {
  const W=300,H=200,cx=W/2,cy=H/2;
  const COLORS=["#8B6914","#A0A0A0","#2D2D2D","#5C3A1E","#4A7C59","#C4A35A","#7B68EE"];
  const isI=rockType&&rockType.includes('화성');
  const isM=rockType&&rockType.includes('변성');
  const isS=rockType&&rockType.includes('퇴적');
  const top=(minerals||[]).slice(0,5);
  const nodes=top.map((m,i)=>{
    const a=(2*Math.PI*i)/top.length-Math.PI/2;
    return {x:cx+68*Math.cos(a),y:cy+68*Math.sin(a),...m};
  });
  let lines='';
  if(isI) nodes.forEach((_,i)=>nodes.forEach((_,j)=>{if(i<j)lines+=`<line x1="${nodes[i].x}" y1="${nodes[i].y}" x2="${nodes[j].x}" y2="${nodes[j].y}" stroke="#c4a06a" stroke-width="1.5" opacity="0.6"/>"`;}));
  else if(isM){nodes.forEach((_,i)=>{if(i<nodes.length-1)lines+=`<line x1="${nodes[i].x}" y1="${nodes[i].y}" x2="${nodes[i+1].x}" y2="${nodes[i+1].y}" stroke="#c4a06a" stroke-width="2.5" opacity="0.6"/>`;}); if(nodes.length>2)lines+=`<line x1="${nodes[0].x}" y1="${nodes[0].y}" x2="${nodes[nodes.length-1].x}" y2="${nodes[nodes.length-1].y}" stroke="#c4a06a" stroke-width="2.5" opacity="0.6"/>`;}
  else nodes.forEach((_,i)=>{if(i<nodes.length-1)lines+=`<line x1="${nodes[i].x}" y1="${nodes[i].y}" x2="${nodes[i+1].x}" y2="${nodes[i+1].y}" stroke="#c4a06a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>`;});
  let circles='';
  nodes.forEach((n,i)=>{
    const r=Math.max(10,Math.min(20,(n.percent||10)/3+10));
    circles+=`<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${COLORS[i%COLORS.length]}" opacity="0.85"/>
    <text x="${n.x}" y="${n.y-r-3}" text-anchor="middle" font-size="9.5" fill="#4a2c0a" font-weight="600">${n.name}</text>
    <text x="${n.x}" y="${n.y+4}" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700">${n.percent}%</text>`;
  });
  const label=isI?'결정질 구조 (등립상)':isM?'엽리 구조 (배향성)':'쇄설성 구조 (입자상)';
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;background:#fdf8f0;border-radius:10px">
    <text x="${cx}" y="16" text-anchor="middle" font-size="11" fill="#8a6a3a" font-weight="600">${label}</text>
    ${lines}<circle cx="${cx}" cy="${cy}" r="22" fill="#8B6914" opacity="0.15"/>
    <circle cx="${cx}" cy="${cy}" r="14" fill="#8B6914" opacity="0.35"/>
    ${circles}
    <text x="${cx}" y="${H-6}" text-anchor="middle" font-size="8.5" fill="#b8944a">● 원 크기 = 광물 비율  |  선 = 결합 관계</text>
  </svg>`;
}

function card(title, html) {
  return `<div class="card"><div class="card-title">${title}</div>${html}</div>`;
}

function showResult(d) {
  document.getElementById('inputView').classList.add('hidden');
  const prev = document.getElementById('uploadPreview');
  const thumbHtml = !prev.classList.contains('hidden') ? `<img src="${prev.src}" class="thumb"/>` : '';

  let html = `<div class="result-hdr">
    <div style="font-size:13px;opacity:.8;margin-bottom:4px">식별된 암석</div>
    <div class="rname">${d.name_ko||''}</div>
    <div class="ename">${d.name_en||''}</div>
    ${thumbHtml}
  </div>`;

  if(d.description) html+=card('📝 설명',`<p style="font-size:13px;color:#444;line-height:1.7">${d.description}</p>`);

  if(d.minerals) html+=card('🔬 조암광물 비율', svgPie(d.minerals)+svgBar(d.minerals));

  if(d.chemistry){
    const rows=d.chemistry.map(c=>`<div class="chem-item"><span class="chem-k">${c.component}</span><span class="chem-v">${c.percent}</span></div>`).join('');
    html+=card('🧪 주요 화학 성분',`<div class="chem-grid">${rows}</div>`);
  }

  if(d.minerals) html+=card('🔗 결합구조도', svgBond(d.classification?.rock_type, d.minerals)+`<p style="font-size:11px;color:#8a6a3a;margin-top:8px;text-align:center">주요 조암광물 간의 결합 관계 및 비율 시각화</p>`);

  if(d.characteristics){
    const rows=[['색상',d.characteristics.color],['경도 (모스)',d.characteristics.hardness],['조직',d.characteristics.texture],['광택',d.characteristics.luster],['생성 환경',d.characteristics.origin]]
      .filter(([,v])=>v).map(([k,v],i)=>`<tr><td class="td-k">${k}</td><td>${v}</td></tr>`).join('');
    html+=card('⚙️ 암석 특성',`<table><tbody>${rows}</tbody></table>`);
  }

  if(d.classification){
    const rows=[['암석 종류',d.classification.rock_type],['세부 분류',d.classification.sub_type],['용도별 분류',d.classification.use]]
      .filter(([,v])=>v).map(([k,v])=>`<tr><td class="td-k">${k}</td><td>${v}</td></tr>`).join('');
    html+=card('🗂️ 분류',`<table><tbody>${rows}</tbody></table>`);
  }

  if(d.distribution?.length){
    const tags=d.distribution.map(t=>`<span class="dist-tag">${t}</span>`).join('');
    html+=card('🗺️ 주요 분포지',`<div class="dist-wrap">${tags}</div>`);
  }

  html+=`<button class="btn btn-reset" onclick="resetApp()">🔄 새 암석 탐구하기</button>`;

  const rv=document.getElementById('resultView');
  rv.innerHTML=html; rv.classList.remove('hidden');
}

function resetApp() {
  imgB64=null;
  document.getElementById('rockInput').value='';
  document.getElementById('uploadPreview').classList.add('hidden');
  document.getElementById('uploadPreview').src='';
  document.getElementById('uploadPlaceholder').classList.remove('hidden');
  document.getElementById('fileInput').value='';
  hideErr();
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('inputView').classList.remove('hidden');
  window.scrollTo(0,0);
}
